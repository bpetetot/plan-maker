name: CI
on:
  pull_request:
  push:
    branches:
      - main
      - production

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ !contains(github.ref, 'main') && !contains(github.ref, 'production') }}

jobs:
  tests:
    name: Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Resolve Playwright version
        id: pw
        run: echo "version=$(node -p "require('./package-lock.json').packages['node_modules/playwright-core'].version")" >> "$GITHUB_OUTPUT"

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: pw-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.pw.outputs.version }}

      # Run even on a cache hit: near-instant when the binary is already there,
      # and it installs the apt deps the cache does not cover.
      - name: Install Playwright browser
        run: npx playwright install --with-deps --only-shell chromium

      - name: Format
        run: npm run format:check

      - name: Lint
        run: npm run lint

      - name: Typescript checking
        run: npm run typecheck

      - name: Tests
        run: npm run test
